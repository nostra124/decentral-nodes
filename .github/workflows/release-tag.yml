name: release-tag

# Cloud Claude Code sessions push through a git proxy that rejects
# refs/tags/* (HTTP 403), and the GitHub MCP toolset exposes no
# create-tag / create-release call. So the tag for a release is cut
# here, server-side, where the job token does not go through that
# proxy. This fires once per version bump: on a push to master it
# reads VERSION and, if no release/tag for that version exists yet,
# creates tag vX.Y.Z (and a matching GitHub Release) at the pushed
# commit. Idempotent — re-runs on later pushes are no-ops until
# VERSION changes again.

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  tag:
    name: tag VERSION if untagged
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag + release for VERSION
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "::error::VERSION is empty" >&2
            exit 1
          fi
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; nothing to do"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag $tag already exists on remote; nothing to do"
            exit 0
          fi
          echo "cutting $tag at ${GITHUB_SHA}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "bitcoin ${version}" \
            --notes "Automated release for ${tag} (VERSION=${version}). See the package commit and issues/done/ for the milestone contents."
