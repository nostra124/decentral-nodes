name: tests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

# Cancel a previous run on the same ref when a new push arrives, so
# rapid pushes don't pile up concurrent (and potentially long-running)
# runs that drain the Actions budget. See BUG-028.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: bats unit tests
    runs-on: ubuntu-latest
    # BUG-028: without a cap a hanging test runs to GitHub's 6-hour
    # default and burns runner minutes. The suite legitimately takes
    # ~9 min (slower when the runner is throttled), so 30 leaves ample
    # headroom while still bounding a true hang.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + runtime deps
        run: sudo apt-get update && sudo apt-get install -y bats dc xxd

      - name: Run unit tests
        id: bats
        # BATS_TEST_TIMEOUT (BUG-028): kill and name an individual
        # hanging test rather than wedging the whole job.
        env:
          BATS_TEST_TIMEOUT: 120
        run: |
          set -o pipefail
          bats tests/unit/*.bats 2>&1 | tee bats.log

      - name: Comment failure log on PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            printf '## CI: bats unit tests failed\n\n'
            printf 'Workflow run: %s\n\n' "$RUN_URL"
            printf 'Commit: `%s`\n\n' "$GITHUB_SHA"
            printf '```\n'
            tail -c 60000 bats.log
            printf '```\n'
          } > pr-comment.md
          gh pr comment "$PR_NUMBER" --body-file pr-comment.md

      - name: Upload bats log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-log
          path: bats.log
          if-no-files-found: ignore

  lint:
    name: shellcheck + cmd-names
    runs-on: ubuntu-latest
    timeout-minutes: 10        # BUG-028: cap runtime; lint is seconds normally.
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      # Gating: catches the BUG-013/014/016 family (command:<name> calls
      # with no matching definition). Verified clean on the tree.
      - name: lint-cmd-names
        run: tools/lint-cmd-names

      # Advisory for now (FEAT-049): the tree is not yet clean under
      # `shellcheck -S warning` (e.g. bip350 has array-quoting findings),
      # so this reports without failing the gate. Promote to blocking
      # once swept clean — tracked as FEAT-052.
      - name: shellcheck (advisory)
        continue-on-error: true
        run: shellcheck -S warning bin/* $(find libexec/bitcoin -type f)
